<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #e3f9ff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cal {
      background-color: #405c85;
      padding: 20px;
      border-radius: 20px;
      width: 300px;
    }

    input {
      width: 100%;
      height: 50px;
      text-align: right;
     border: 1px solid #ccc;
     margin-bottom: 10px;
     padding: 5px;
       outline: 0;
       height: 60px;
       border-radius: 10px;
       box-shadow: -8px -8px 16px rgba(255, 255, 255, 0.2), 8px 8px 16px rgba(0, 0, 0, 0.2);
      
      background: transparent;
      font-size: 20px;
    
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
       border: 0;
       outline: 0;
       height: 60px;
       border-radius: 10px;
       box-shadow: -8px -8px 16px rgba(255, 255, 255, 0.2), 8px 8px 16px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      background: transparent;
      font-size: 20px;
    
    }

    button:hover {
      transform: scale(1.1);
      background-color: rgb(0, 115, 255);
    }

    button:active {
      opacity: 0.7;
    }

    .clear-btn {
      grid-column: span 2;
     
      background-color: crimson;
    }
  </style>
</head>
<body>
  <div class="cal">
   
      <input  onkeydown="
        doit();
        " >
      <div class="grid">
        <button onclick="display('1') " >1</button>
        <button onclick="display('2') ">2</button>
        <button onclick="display('3') ">3</button>
        <button onclick="display('+') ">+</button>
        <button onclick="display('4') ">4</button>
        <button onclick="display('5') ">5</button>
        <button onclick="display('6') ">6</button>
        <button onclick="display('-') ">-</button>
        <button onclick="display('7') ">7</button>
        <button onclick="display('8') ">8</button>
        <button onclick="display('9') ">9</button>
        <button onclick="display('*') ">*</button>
        <button onclick="display('0') ">0</button>
        <button onclick="display('.') ">.</button>
        <button onclick="cal('=') ">=</button>
        <button onclick="display('/') ">/</button>
        <button class="clear-btn" onclick="  input.value = '' ">AC</button>
        <button class="clear-btn" onclick="  input.value= input.value.slice(0, -1)" >DE</button>
      </div>
   
  </div>
  <script> 
    const input = document.querySelector('input');
   function display(value) {
    input.value += value;
    
   }
    function doit() {
      

    }
  </script>
</body>
</html>
